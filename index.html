<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; connect-src 'self' https://endoflife.date; img-src 'self' data: https:; font-src 'self' https://fonts.gstatic.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; script-src 'self' 'unsafe-inline'; object-src 'none'; base-uri 'none'; form-action 'none'; frame-ancestors 'none'"
    />
    <meta name="referrer" content="no-referrer" />
    <title>EOL Explorer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,700&family=Space+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        color-scheme: light dark;
        --color-bg: #f3f5ea;
        --color-bg-alt: #e6ecf6;
        --color-surface: #fffdf8;
        --color-surface-2: #f5f7fc;
        --color-text: #172034;
        --color-muted: #56617b;
        --color-border: rgba(23, 32, 52, 0.14);
        --color-accent: #1168e6;
        --color-accent-2: #ff7f50;
        --shadow: 0 14px 40px rgba(24, 38, 63, 0.15);
        --status-active: #18a957;
        --status-soon: #d78d1e;
        --status-eol: #d23f3f;
        --status-unknown: #77839c;
        --phase-active: color-mix(in srgb, var(--status-active) 38%, var(--color-surface-2));
        --phase-security: color-mix(in srgb, var(--status-soon) 48%, var(--color-surface-2));
        --phase-extended: color-mix(in srgb, var(--status-eol) 32%, var(--color-surface-2));
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --color-bg: #0d141f;
          --color-bg-alt: #1a1723;
          --color-surface: #101a27;
          --color-surface-2: #172437;
          --color-text: #e7ecf8;
          --color-muted: #a7b0c5;
          --color-border: rgba(231, 236, 248, 0.13);
          --color-accent: #4da0ff;
          --color-accent-2: #ff9b74;
          --shadow: 0 22px 40px rgba(0, 0, 0, 0.35);
          --status-active: #4ed48a;
          --status-soon: #f2ba62;
          --status-eol: #ff7f7f;
          --status-unknown: #9ea7bc;
        }
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Space Grotesk", "Segoe UI", sans-serif;
        color: var(--color-text);
        background:
          radial-gradient(circle at 6% 4%, color-mix(in srgb, var(--color-accent-2) 22%, transparent), transparent 34%),
          radial-gradient(circle at 95% 95%, color-mix(in srgb, var(--color-accent) 20%, transparent), transparent 28%),
          linear-gradient(140deg, var(--color-bg), var(--color-bg-alt));
        min-height: 100vh;
      }

      a {
        color: var(--color-accent);
      }

      .app {
        width: min(1200px, 100% - 2rem);
        margin: 1.1rem auto 2rem;
      }

      .top {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 1rem;
        align-items: end;
        margin-bottom: 1rem;
      }

      .brand h1 {
        margin: 0;
        font-family: "Fraunces", serif;
        font-size: clamp(1.8rem, 3.6vw, 2.7rem);
        font-weight: 700;
        letter-spacing: -0.02em;
      }

      .brand p {
        margin: 0.35rem 0 0;
        color: var(--color-muted);
      }

      .view-switch {
        display: flex;
        background: color-mix(in srgb, var(--color-surface) 78%, transparent);
        border: 1px solid var(--color-border);
        border-radius: 999px;
        padding: 0.25rem;
        backdrop-filter: blur(8px);
      }

      .view-switch button {
        border: 0;
        background: transparent;
        color: var(--color-text);
        padding: 0.5rem 1rem;
        border-radius: 999px;
        font-weight: 600;
        cursor: pointer;
      }

      .view-switch button.active {
        background: var(--color-accent);
        color: white;
      }

      .layout {
        display: grid;
        grid-template-columns: 300px 1fr;
        gap: 1rem;
      }

      .panel {
        background: color-mix(in srgb, var(--color-surface) 85%, transparent);
        border: 1px solid var(--color-border);
        border-radius: 20px;
        box-shadow: var(--shadow);
        backdrop-filter: blur(9px);
      }

      .filters {
        padding: 1rem;
        position: sticky;
        top: 1rem;
        align-self: start;
      }

      .filters h2 {
        margin: 0;
        font-family: "Fraunces", serif;
      }

      .field {
        margin-top: 0.95rem;
      }

      .field label {
        display: block;
        font-size: 0.83rem;
        color: var(--color-muted);
        margin-bottom: 0.35rem;
      }

      .field input,
      .field select {
        width: 100%;
        border: 1px solid var(--color-border);
        background: var(--color-surface-2);
        color: var(--color-text);
        border-radius: 12px;
        padding: 0.63rem 0.7rem;
        font: inherit;
      }

      .status-row {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 0.5rem;
      }

      .status-row button,
      .toggle,
      .pin {
        border: 1px solid var(--color-border);
        background: var(--color-surface-2);
        color: var(--color-text);
        border-radius: 12px;
        padding: 0.55rem 0.65rem;
        font: inherit;
        font-size: 0.86rem;
        cursor: pointer;
      }

      .status-row button.active,
      .toggle.on,
      .pin.on {
        border-color: color-mix(in srgb, var(--color-accent) 50%, var(--color-border));
        background: color-mix(in srgb, var(--color-accent) 22%, var(--color-surface-2));
      }

      .count {
        margin-top: 0.85rem;
        font-size: 0.85rem;
        color: var(--color-muted);
      }

      .main {
        min-height: 520px;
        padding: 1rem;
        animation: rise 280ms ease-out;
      }

      @keyframes rise {
        from {
          opacity: 0;
          transform: translateY(8px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
        gap: 0.85rem;
      }

      .card {
        border: 1px solid var(--color-border);
        border-radius: 16px;
        background: var(--color-surface-2);
        padding: 0.8rem;
        display: grid;
        gap: 0.68rem;
      }

      .card-head {
        display: grid;
        grid-template-columns: 1fr auto;
        align-items: start;
        gap: 0.5rem;
      }

      .product-btn {
        border: 0;
        background: transparent;
        color: var(--color-text);
        font: inherit;
        text-align: left;
        padding: 0;
        cursor: pointer;
      }

      .product-btn strong {
        display: block;
        font-size: 1rem;
      }

      .product-btn small {
        display: block;
        color: var(--color-muted);
      }

      .pill,
      .status {
        display: inline-flex;
        align-items: center;
        border-radius: 999px;
        font-size: 0.73rem;
        padding: 0.23rem 0.55rem;
        border: 1px solid var(--color-border);
      }

      .status.active {
        color: var(--status-active);
        border-color: color-mix(in srgb, var(--status-active) 35%, var(--color-border));
      }

      .status.soon {
        color: var(--status-soon);
        border-color: color-mix(in srgb, var(--status-soon) 35%, var(--color-border));
      }

      .status.eol {
        color: var(--status-eol);
        border-color: color-mix(in srgb, var(--status-eol) 35%, var(--color-border));
      }

      .status.unknown {
        color: var(--status-unknown);
      }

      .meta {
        display: flex;
        gap: 0.45rem;
        flex-wrap: wrap;
      }

      .card-actions {
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .ghost {
        border: 0;
        background: transparent;
        color: var(--color-accent);
        font-weight: 600;
        cursor: pointer;
      }

      .detail-head {
        display: grid;
        gap: 0.6rem;
        margin-bottom: 1rem;
      }

      .detail-head h2 {
        margin: 0;
        font-family: "Fraunces", serif;
        font-size: clamp(1.4rem, 2.2vw, 1.9rem);
      }

      .tag-list {
        display: flex;
        flex-wrap: wrap;
        gap: 0.4rem;
      }

      .table-wrap {
        overflow: auto;
        border: 1px solid var(--color-border);
        border-radius: 12px;
      }

      table {
        border-collapse: collapse;
        width: 100%;
        min-width: 760px;
        font-size: 0.9rem;
      }

      th,
      td {
        text-align: left;
        padding: 0.62rem;
        border-bottom: 1px solid var(--color-border);
        vertical-align: top;
      }

      th {
        position: sticky;
        top: 0;
        background: color-mix(in srgb, var(--color-surface-2) 88%, transparent);
      }

      tr.old {
        opacity: 0.64;
      }

      tr.soon {
        background: color-mix(in srgb, var(--status-soon) 14%, transparent);
      }

      .timeline {
        overflow: auto;
      }

      .timeline-grid {
        min-width: 900px;
      }

      .timeline-axis {
        position: sticky;
        top: 0;
        z-index: 2;
        display: grid;
        grid-template-columns: 220px 1fr;
        background: color-mix(in srgb, var(--color-surface) 90%, transparent);
        border-bottom: 1px solid var(--color-border);
      }

      .ticks {
        position: relative;
        height: 40px;
        overflow: hidden;
      }

      .tick {
        position: absolute;
        top: 10px;
        transform: translateX(-50%);
        font-size: 0.74rem;
        color: var(--color-muted);
        white-space: nowrap;
        padding: 0 0.2rem;
        background: color-mix(in srgb, var(--color-surface) 86%, transparent);
      }

      .today-line {
        position: absolute;
        top: 0;
        bottom: 0;
        width: 2px;
        background: color-mix(in srgb, var(--status-eol) 70%, var(--color-accent));
        z-index: 3;
      }

      .timeline-row {
        display: grid;
        grid-template-columns: 220px 1fr;
        border-bottom: 1px solid var(--color-border);
        min-height: 38px;
      }

      .row-label {
        font-size: 0.85rem;
        padding: 0.5rem;
        color: var(--color-text);
      }

      .bar-area {
        position: relative;
      }

      .bar {
        position: absolute;
        top: 8px;
        height: 22px;
        border-radius: 999px;
        border: 1px solid var(--color-border);
        display: flex;
        align-items: center;
        padding: 0 0.5rem;
        font-size: 0.74rem;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        cursor: pointer;
      }

      .bar:focus-visible {
        outline: 2px solid var(--color-accent);
        outline-offset: 2px;
      }

      .bar.active {
        background: color-mix(in srgb, var(--status-active) 24%, var(--color-surface-2));
      }

      .bar.soon {
        background: color-mix(in srgb, var(--status-soon) 24%, var(--color-surface-2));
      }

      .bar.eol {
        background: color-mix(in srgb, var(--status-eol) 18%, var(--color-surface-2));
        opacity: 0.6;
      }

      .timeline-tooltip {
        position: fixed;
        z-index: 30;
        max-width: 340px;
        min-width: 260px;
        background: color-mix(in srgb, var(--color-surface) 92%, transparent);
        border: 1px solid var(--color-border);
        border-radius: 14px;
        box-shadow: var(--shadow);
        padding: 0.72rem;
        opacity: 0;
        transform: translateY(6px);
        transition: opacity 120ms ease, transform 120ms ease;
        pointer-events: none;
      }

      .timeline-tooltip.visible {
        opacity: 1;
        transform: translateY(0);
      }

      .tt-title {
        margin: 0;
        font-size: 0.95rem;
        font-weight: 700;
      }

      .tt-subtitle {
        margin: 0.15rem 0 0.45rem;
        color: var(--color-muted);
        font-size: 0.82rem;
      }

      .tt-grid {
        display: grid;
        grid-template-columns: auto 1fr;
        gap: 0.28rem 0.6rem;
        font-size: 0.82rem;
      }

      .tt-grid dt {
        color: var(--color-muted);
      }

      .tt-grid dd {
        margin: 0;
      }

      .empty,
      .error,
      .loading {
        padding: 1rem;
        border: 1px dashed var(--color-border);
        border-radius: 12px;
        color: var(--color-muted);
      }

      .skeleton {
        height: 150px;
        border-radius: 16px;
        border: 1px solid var(--color-border);
        background: linear-gradient(
          90deg,
          color-mix(in srgb, var(--color-surface-2) 80%, transparent) 20%,
          color-mix(in srgb, var(--color-accent) 14%, var(--color-surface-2)) 50%,
          color-mix(in srgb, var(--color-surface-2) 80%, transparent) 80%
        );
        background-size: 280% 100%;
        animation: shimmer 1.3s linear infinite;
      }

      @keyframes shimmer {
        0% {
          background-position: 120% 0;
        }
        100% {
          background-position: -120% 0;
        }
      }

      @media (max-width: 980px) {
        .layout {
          grid-template-columns: 1fr;
        }

        .filters {
          position: static;
        }

        .main {
          min-height: 420px;
        }
      }

      @media (max-width: 640px) {
        .app {
          width: min(1200px, 100% - 1rem);
          margin-top: 0.7rem;
        }

        .top {
          grid-template-columns: 1fr;
        }

        .status-row {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <header class="top">
        <div class="brand">
          <h1>EOL Explorer</h1>
          <p>Track support windows for the products you care about.</p>
        </div>
        <nav class="view-switch" aria-label="Views">
          <button type="button" data-view="dashboard">Dashboard</button>
          <button type="button" data-view="timeline">Timeline</button>
        </nav>
      </header>

      <div class="layout">
        <aside class="panel filters" id="filters"></aside>
        <main class="panel main" id="root"></main>
      </div>
    </div>

    <script>
      const API_BASE = "https://endoflife.date/api/v1";
      const PIN_KEY = "eolExplorer:pins:v1";
      const LIST_KEY = "eolExplorer:products:v1";
      const SOON_MONTHS = 12;

      const state = {
        currentView: "dashboard",
        searchText: "",
        selectedCategory: "all",
        selectedStatus: "all",
        showPinnedOnly: false,
        pinnedProducts: loadPins(),
        detailCache: new Map(),
        statusByProduct: new Map(),
        products: [],
        categories: [],
        loadingProducts: true,
        productLoadError: "",
        observer: null,
      };

      const root = document.getElementById("root");
      const filtersRoot = document.getElementById("filters");
      const switchButtons = Array.from(document.querySelectorAll(".view-switch button"));
      const timelineTooltip = document.createElement("div");

      timelineTooltip.className = "timeline-tooltip";
      timelineTooltip.setAttribute("role", "tooltip");
      document.body.appendChild(timelineTooltip);

      document.addEventListener("keydown", (event) => {
        if (event.key === "Escape") {
          hideTimelineTooltip();
        }
      });

      switchButtons.forEach((btn) => {
        btn.addEventListener("click", () => {
          if (btn.dataset.view === "dashboard") {
            location.hash = "#dashboard";
          } else {
            location.hash = "#timeline";
          }
        });
      });

      window.addEventListener("hashchange", route);

      init();

      async function init() {
        renderFilters();
        showDashboardSkeleton();
        await fetchProductList();
        route();
        primePinnedStatuses();
      }

      function route() {
        hideTimelineTooltip();
        const hash = window.location.hash || "#dashboard";
        if (hash.startsWith("#product/")) {
          state.currentView = "detail";
          const name = decodeURIComponent(hash.replace("#product/", ""));
          setNav(null);
          renderDetailView(name);
          return;
        }

        if (hash === "#timeline") {
          state.currentView = "timeline";
          setNav("timeline");
          renderTimelineView();
          return;
        }

        state.currentView = "dashboard";
        setNav("dashboard");
        renderDashboard();
      }

      function setNav(view) {
        switchButtons.forEach((btn) => {
          btn.classList.toggle("active", btn.dataset.view === view);
        });
      }

      function loadPins() {
        try {
          const parsed = JSON.parse(localStorage.getItem(PIN_KEY) || "[]");
          return new Set(Array.isArray(parsed) ? parsed : []);
        } catch {
          return new Set();
        }
      }

      function savePins() {
        localStorage.setItem(PIN_KEY, JSON.stringify(Array.from(state.pinnedProducts)));
      }

      function getDetailCacheKey(name) {
        return `eolExplorer:detail:v1:${name}`;
      }

      function loadDetailFromStorage(name) {
        try {
          const item = localStorage.getItem(getDetailCacheKey(name));
          if (!item) return null;
          return JSON.parse(item);
        } catch {
          return null;
        }
      }

      function saveDetailToStorage(name, data) {
        try {
          localStorage.setItem(getDetailCacheKey(name), JSON.stringify(data));
        } catch {
          // Storage quota issues should not block app usage.
        }
      }

      function toDateSafe(value) {
        if (!value) return null;
        const dt = new Date(value);
        return Number.isNaN(dt.getTime()) ? null : dt;
      }

      function addMonths(baseDate, months) {
        const copy = new Date(baseDate);
        copy.setMonth(copy.getMonth() + months);
        return copy;
      }

      function formatDate(dateOrString) {
        const dt = typeof dateOrString === "string" ? toDateSafe(dateOrString) : dateOrString;
        if (!dt) return "-";
        return dt.toLocaleDateString(undefined, { year: "numeric", month: "short", day: "numeric" });
      }

      function buildBarGradient(row) {
        const eoasDate = toDateSafe(row.eoasFrom);
        if (!eoasDate) return null;
        const barMs = row.end.getTime() - row.start.getTime();
        if (barMs <= 0) return null;
        const pct = (d) => Math.max(0, Math.min(100, (d.getTime() - row.start.getTime()) / barMs * 100)).toFixed(2);
        const eoasPct = pct(eoasDate);
        const eolDate = toDateSafe(row.eolFrom);
        const eoesDate = toDateSafe(row.eoesFrom);
        if (eolDate && eoesDate && eoesDate > eolDate) {
          const eolPct = pct(eolDate);
          return `linear-gradient(to right, var(--phase-active) ${eoasPct}%, var(--phase-security) ${eoasPct}% ${eolPct}%, var(--phase-extended) ${eolPct}% 100%)`;
        }
        return `linear-gradient(to right, var(--phase-active) ${eoasPct}%, var(--phase-security) ${eoasPct}% 100%)`;
      }

      function normalizeStatus(status) {
        if (status === "active" || status === "soon" || status === "eol") {
          return status;
        }
        return "unknown";
      }

      function classifyReleaseStatus(release, now = new Date()) {
        const eolDate = toDateSafe(release.eolFrom);
        if (release.isEol === true) return "eol";
        if (!eolDate) return "active";
        if (eolDate < now) return "eol";
        if (eolDate <= addMonths(now, SOON_MONTHS)) return "soon";
        return "active";
      }

      function computeProductStatus(productDetail) {
        const releases = Array.isArray(productDetail.releases) ? productDetail.releases : [];
        if (releases.length === 0) {
          return { status: "unknown", eolDate: null, label: "Unknown" };
        }

        const candidates = releases
          .map((release) => {
            const status = classifyReleaseStatus(release);
            const eolDate = toDateSafe(release.eolFrom);
            return { release, status, eolDate };
          })
          .sort((a, b) => {
            const ad = a.eolDate ? a.eolDate.getTime() : Number.POSITIVE_INFINITY;
            const bd = b.eolDate ? b.eolDate.getTime() : Number.POSITIVE_INFINITY;
            return ad - bd;
          });

        const ORDER = ["active", "soon", "eol"];
        const presentSet = new Set(candidates.map((c) => c.status).filter((s) => ORDER.includes(s)));
        const statuses = ORDER.filter((s) => presentSet.has(s));

        const activeOrSoon = candidates.find((c) => c.status === "active" || c.status === "soon");
        if (activeOrSoon) {
          const label = activeOrSoon.status === "soon" ? "EOL Soon" : "Active";
          return { status: activeOrSoon.status, eolDate: activeOrSoon.eolDate, label, statuses };
        }

        const eol = candidates.find((c) => c.status === "eol");
        if (eol) {
          return { status: "eol", eolDate: eol.eolDate, label: "EOL", statuses };
        }

        return { status: "unknown", eolDate: null, label: "Unknown", statuses: ["unknown"] };
      }

      async function fetchJson(url) {
        const response = await fetch(url, { headers: { Accept: "application/json" } });
        if (!response.ok) {
          const err = new Error(`Request failed with status ${response.status}`);
          err.status = response.status;
          throw err;
        }
        return response.json();
      }

      async function fetchProductList() {
        state.loadingProducts = true;
        state.productLoadError = "";

        const cached = sessionStorage.getItem(LIST_KEY);
        if (cached) {
          try {
            const parsed = JSON.parse(cached);
            const result = parsed.result || [];
            applyProductList(result);
            state.loadingProducts = false;
            return;
          } catch {
            sessionStorage.removeItem(LIST_KEY);
          }
        }

        try {
          const payload = await fetchJson(`${API_BASE}/products`);
          const result = payload.result || [];
          sessionStorage.setItem(LIST_KEY, JSON.stringify(payload));
          applyProductList(result);
        } catch (error) {
          state.productLoadError = explainApiError(error);
        } finally {
          state.loadingProducts = false;
        }
      }

      function applyProductList(result) {
        state.products = result;
        state.categories = [...new Set(result.map((p) => p.category).filter(Boolean))].sort();
        renderFilters();
      }

      function explainApiError(error) {
        if (error && error.status === 429) {
          return "The API rate limit was reached. Please wait a bit and retry.";
        }
        if (error && error.status === 404) {
          return "A requested resource was not found.";
        }
        return "Unable to reach endoflife.date right now. Please retry in a moment.";
      }

      function sanitizeExternalUrl(value) {
        if (!value) return "";
        try {
          const parsed = new URL(String(value), window.location.origin);
          if (parsed.protocol === "https:" || parsed.protocol === "http:") {
            return parsed.href;
          }
          return "";
        } catch {
          return "";
        }
      }

      async function fetchProduct(name) {
        if (state.detailCache.has(name)) {
          return state.detailCache.get(name);
        }

        const cached = loadDetailFromStorage(name);
        if (cached && cached.result) {
          state.detailCache.set(name, cached.result);
          return cached.result;
        }

        const payload = await fetchJson(`${API_BASE}/products/${encodeURIComponent(name)}`);
        const data = payload.result;
        state.detailCache.set(name, data);
        saveDetailToStorage(name, payload);
        return data;
      }

      function getFilteredProducts() {
        const text = state.searchText.trim().toLowerCase();

        return state.products.filter((product) => {
          const inSearch =
            text.length === 0 ||
            product.label.toLowerCase().includes(text) ||
            product.name.toLowerCase().includes(text) ||
            (product.aliases || []).some((alias) => alias.toLowerCase().includes(text));

          if (!inSearch) return false;
          if (state.selectedCategory !== "all" && product.category !== state.selectedCategory) return false;
          if (state.showPinnedOnly && !state.pinnedProducts.has(product.name)) return false;

          if (state.selectedStatus !== "all") {
            const resolved = state.statusByProduct.get(product.name);
            if (!resolved) return false;
            return (resolved.statuses || [normalizeStatus(resolved.status)]).includes(state.selectedStatus);
          }

          return true;
        });
      }

      function createPillElement(text) {
        const span = document.createElement("span");
        span.className = "pill";
        span.textContent = String(text || "");
        return span;
      }

      function createStatusElement(statusInfo) {
        const status = normalizeStatus(statusInfo?.status);
        const label = statusLabel(status);
        const span = document.createElement("span");
        span.className = `status ${status}`;
        span.textContent = label;
        return span;
      }

      function statusLabel(status) {
        const normalized = normalizeStatus(status);
        if (normalized === "active") return "Active";
        if (normalized === "soon") return "EOL Soon";
        if (normalized === "eol") return "EOL";
        return "Unknown";
      }

      function makeEl(tag, props = {}, text) {
        const el = document.createElement(tag);
        Object.entries(props).forEach(([k, v]) => {
          if (k === "className") el.className = v;
          else if (k === "type") el.type = v;
          else if (k.startsWith("data-")) el.dataset[k.slice(5).replace(/-([a-z])/g, (_, c) => c.toUpperCase())] = v;
          else el.setAttribute(k, v);
        });
        if (text !== undefined) el.textContent = text;
        return el;
      }

      function makeInfoNode(cls, message) {
        return makeEl("div", { className: cls }, message);
      }

      function renderFilters() {
        const statusDefs = [
          ["all", "All"],
          ["active", "Active"],
          ["soon", "EOL Soon"],
          ["eol", "EOL"],
        ];

        filtersRoot.textContent = "";

        filtersRoot.appendChild(makeEl("h2", {}, "Filter"));

        // Search field
        const searchField = makeEl("div", { className: "field" });
        const searchLabel = makeEl("label", { for: "search" }, "Search product");
        const searchInput = makeEl("input", { id: "search", type: "search", placeholder: "e.g. Node.js, Ubuntu" });
        searchInput.value = state.searchText;
        searchField.appendChild(searchLabel);
        searchField.appendChild(searchInput);
        filtersRoot.appendChild(searchField);

        // Category field
        const catField = makeEl("div", { className: "field" });
        const catLabel = makeEl("label", { for: "category" }, "Category");
        const catSelect = makeEl("select", { id: "category" });
        const allOpt = makeEl("option", { value: "all" }, "All categories");
        if (state.selectedCategory === "all") allOpt.selected = true;
        catSelect.appendChild(allOpt);
        state.categories.forEach((c) => {
          const opt = makeEl("option", { value: c }, c);
          if (state.selectedCategory === c) opt.selected = true;
          catSelect.appendChild(opt);
        });
        catField.appendChild(catLabel);
        catField.appendChild(catSelect);
        filtersRoot.appendChild(catField);

        // Status buttons
        const statusField = makeEl("div", { className: "field" });
        statusField.appendChild(makeEl("label", {}, "Status"));
        const statusRow = makeEl("div", { className: "status-row" });
        statusDefs.forEach(([value, label]) => {
          const btn = makeEl("button", { type: "button" }, label);
          btn.dataset.status = value;
          if (state.selectedStatus === value) btn.classList.add("active");
          statusRow.appendChild(btn);
        });
        statusField.appendChild(statusRow);
        filtersRoot.appendChild(statusField);

        // Pinned-only toggle
        const pinField = makeEl("div", { className: "field" });
        const pinnedOnly = makeEl("button", { type: "button", id: "pinned-only" });
        pinnedOnly.className = `toggle ${state.showPinnedOnly ? "on" : ""}`;
        pinnedOnly.textContent = state.showPinnedOnly ? "Pinned only: On" : "Pinned only: Off";
        pinField.appendChild(pinnedOnly);
        filtersRoot.appendChild(pinField);

        filtersRoot.appendChild(makeEl("div", { className: "count", id: "count" }, "Showing 0 products"));

        // Events
        searchInput.addEventListener("input", (event) => {
          state.searchText = event.target.value;
          if (state.currentView === "dashboard") renderDashboard();
        });

        catSelect.addEventListener("change", (event) => {
          state.selectedCategory = event.target.value;
          if (state.currentView === "dashboard") renderDashboard();
          if (state.currentView === "timeline") renderTimelineView();
        });

        pinnedOnly.addEventListener("click", () => {
          state.showPinnedOnly = !state.showPinnedOnly;
          renderFilters();
          if (state.currentView === "dashboard") renderDashboard();
          if (state.currentView === "timeline") renderTimelineView();
        });

        Array.from(statusRow.querySelectorAll("[data-status]")).forEach((btn) => {
          btn.addEventListener("click", () => {
            state.selectedStatus = btn.dataset.status;
            renderFilters();
            if (state.currentView === "dashboard") renderDashboard();
            if (state.currentView === "timeline") renderTimelineView();
          });
        });
      }

      function updateCountDisplay(current, total = state.products.length) {
        const count = filtersRoot.querySelector("#count");
        if (count) {
          count.textContent = `Showing ${current} of ${total} products`;
        }
      }

      function showDashboardSkeleton() {
        root.textContent = "";
        const grid = makeEl("div", { className: "grid" });
        Array.from({ length: 8 }).forEach(() => grid.appendChild(makeEl("div", { className: "skeleton" })));
        root.appendChild(grid);
      }

      function renderDashboard() {
        if (state.loadingProducts) {
          showDashboardSkeleton();
          return;
        }

        if (state.productLoadError) {
          root.textContent = "";
          root.appendChild(makeInfoNode("error", state.productLoadError));
          updateCountDisplay(0, 0);
          return;
        }

        const filtered = getFilteredProducts();
        updateCountDisplay(filtered.length, state.products.length);

        if (filtered.length === 0) {
          root.textContent = "";
          root.appendChild(makeInfoNode("empty", "No products match your filters. Try clearing a filter or broadening your search."));
          return;
        }

        root.textContent = "";
        const grid = document.createElement("div");
        grid.className = "grid";
        filtered.forEach((product) => {
          grid.appendChild(createCardElement(product));
        });
        root.appendChild(grid);

        attachCardEvents(filtered);
        setupIntersectionObserver(filtered);
      }

      function createCardElement(product) {
        const statusInfo = state.statusByProduct.get(product.name);
        const pinned = state.pinnedProducts.has(product.name);

        const card = document.createElement("article");
        card.className = "card";
        card.dataset.product = product.name;

        const head = document.createElement("div");
        head.className = "card-head";

        const productBtn = document.createElement("button");
        productBtn.className = "product-btn";
        productBtn.type = "button";
        productBtn.dataset.open = product.name;

        const strong = document.createElement("strong");
        strong.textContent = product.label || product.name || "Unknown";
        const small = document.createElement("small");
        small.textContent = product.name || "-";
        productBtn.appendChild(strong);
        productBtn.appendChild(small);

        const pinBtn = document.createElement("button");
        pinBtn.className = `pin ${pinned ? "on" : ""}`;
        pinBtn.type = "button";
        pinBtn.dataset.pin = product.name;
        pinBtn.textContent = pinned ? "Pinned" : "Pin";

        head.appendChild(productBtn);
        head.appendChild(pinBtn);

        const meta = document.createElement("div");
        meta.className = "meta";
        meta.appendChild(createPillElement(product.category || "uncategorized"));
        const statuses = statusInfo?.statuses || (statusInfo ? [normalizeStatus(statusInfo.status)] : []);
        statuses.forEach((s) => meta.appendChild(createStatusElement({ status: s })));

        const actions = document.createElement("div");
        actions.className = "card-actions";

        const tags = document.createElement("small");
        tags.textContent = (product.tags || []).slice(0, 3).join(" | ");

        const detailsBtn = document.createElement("button");
        detailsBtn.className = "ghost";
        detailsBtn.type = "button";
        detailsBtn.dataset.open = product.name;
        detailsBtn.textContent = "Details";

        actions.appendChild(tags);
        actions.appendChild(detailsBtn);

        card.appendChild(head);
        card.appendChild(meta);
        card.appendChild(actions);

        return card;
      }

      function attachCardEvents(products) {
        const openButtons = root.querySelectorAll("[data-open]");
        openButtons.forEach((button) => {
          button.addEventListener("click", () => {
            location.hash = `#product/${encodeURIComponent(button.dataset.open)}`;
          });
        });

        const pinButtons = root.querySelectorAll("[data-pin]");
        pinButtons.forEach((button) => {
          button.addEventListener("click", async () => {
            const name = button.dataset.pin;
            if (state.pinnedProducts.has(name)) {
              state.pinnedProducts.delete(name);
            } else {
              state.pinnedProducts.add(name);
              resolveProductStatus(name);
            }
            savePins();
            if (state.currentView === "dashboard") renderDashboard();
            if (state.currentView === "timeline") renderTimelineView();
          });
        });
      }

      function setupIntersectionObserver(products) {
        if (state.observer) {
          state.observer.disconnect();
        }

        state.observer = new IntersectionObserver(
          (entries) => {
            entries.forEach((entry) => {
              if (!entry.isIntersecting) return;
              const name = entry.target.dataset.product;
              if (name && !state.statusByProduct.has(name)) {
                resolveProductStatus(name);
              }
              state.observer.unobserve(entry.target);
            });
          },
          { rootMargin: "120px" }
        );

        products.forEach((product) => {
          if (state.statusByProduct.has(product.name)) return;
          const el = root.querySelector(`[data-product="${cssEscape(product.name)}"]`);
          if (el) {
            state.observer.observe(el);
          }
        });
      }

      function updateCardStatus(name) {
        if (state.currentView !== "dashboard") return;
        const card = root.querySelector(`[data-product="${cssEscape(name)}"]`);
        const statusInfo = state.statusByProduct.get(name);
        if (!card || !statusInfo) return;
        card.querySelectorAll(".status").forEach((el) => el.remove());
        const pill = card.querySelector(".pill");
        const statuses = statusInfo.statuses || [normalizeStatus(statusInfo.status)];
        statuses.forEach((s) => pill.after(createStatusElement({ status: s })));

        if (state.selectedStatus !== "all") {
          renderDashboard();
        }
      }

      async function resolveProductStatus(name) {
        if (state.statusByProduct.has(name)) return state.statusByProduct.get(name);

        try {
          const detail = await fetchProduct(name);
          const statusInfo = computeProductStatus(detail);
          state.statusByProduct.set(name, statusInfo);
          updateCardStatus(name);
          return statusInfo;
        } catch {
          const fallback = { status: "unknown", eolDate: null, label: "Unknown" };
          state.statusByProduct.set(name, fallback);
          updateCardStatus(name);
          return fallback;
        }
      }

      async function primePinnedStatuses() {
        const pins = Array.from(state.pinnedProducts);
        await Promise.all(pins.map((name) => resolveProductStatus(name)));
        if (state.currentView === "dashboard") {
          renderDashboard();
        }
      }

      async function renderDetailView(name) {
        root.textContent = "";
        root.appendChild(makeInfoNode("loading", "Loading product details..."));

        try {
          const detail = await fetchProduct(name);
          const productStatus = computeProductStatus(detail);
          state.statusByProduct.set(name, productStatus);
          const pinned = state.pinnedProducts.has(name);
          const detailHtmlLink = sanitizeExternalUrl(detail.links?.html || "");

          root.textContent = "";

          const detailHead = makeEl("div", { className: "detail-head" });
          const backBtn = makeEl("button", { className: "ghost", type: "button" }, "Back to Dashboard");
          const title = makeEl("h2", {});
          const meta = makeEl("div", { className: "meta" });
          const tags = makeEl("div", { className: "tag-list" });
          const actions = makeEl("div", { className: "meta" });
          detailHead.appendChild(backBtn);
          detailHead.appendChild(title);
          detailHead.appendChild(meta);
          detailHead.appendChild(tags);
          detailHead.appendChild(actions);

          const tableWrap = makeEl("div", { className: "table-wrap" });
          const table = makeEl("table", {});
          const thead = makeEl("thead", {});
          const headRow = makeEl("tr", {});
          ["Version", "LTS", "Released", "Active Support Ends", "EOL Date", "Status", "Latest"].forEach((h) =>
            headRow.appendChild(makeEl("th", {}, h))
          );
          thead.appendChild(headRow);
          const tbody = makeEl("tbody", {});
          table.appendChild(thead);
          table.appendChild(tbody);
          tableWrap.appendChild(table);

          root.appendChild(detailHead);
          root.appendChild(tableWrap);

          const pinBtn = makeEl("button", { type: "button" });

          title.textContent = detail.label || detail.name || "Unknown product";
          meta.appendChild(createPillElement(detail.category || "uncategorized"));
          meta.appendChild(createStatusElement(productStatus));

          (detail.tags || []).forEach((tag) => {
            tags.appendChild(createPillElement(tag));
          });

          pinBtn.classList.toggle("on", pinned);
          pinBtn.textContent = pinned ? "Pinned" : "Pin";
          actions.appendChild(pinBtn);

          if (detailHtmlLink) {
            const external = document.createElement("a");
            external.href = detailHtmlLink;
            external.target = "_blank";
            external.rel = "noopener noreferrer";
            external.textContent = "Open on endoflife.date";
            actions.appendChild(external);
          } else {
            actions.appendChild(createPillElement("External link unavailable"));
          }

          appendReleaseRows(tbody, detail.releases || []);

          backBtn.addEventListener("click", () => {
            location.hash = "#dashboard";
          });

          pinBtn.addEventListener("click", () => {
            if (state.pinnedProducts.has(name)) {
              state.pinnedProducts.delete(name);
            } else {
              state.pinnedProducts.add(name);
            }
            savePins();
            pinBtn.classList.toggle("on", state.pinnedProducts.has(name));
            pinBtn.textContent = state.pinnedProducts.has(name) ? "Pinned" : "Pin";
          });
        } catch (error) {
          root.textContent = "";
          root.appendChild(makeInfoNode("error", explainApiError(error)));
        }
      }

      function appendReleaseRows(tbody, releases) {
        tbody.textContent = "";
        const sorted = [...releases].sort((a, b) => {
          const ad = toDateSafe(a.releaseDate);
          const bd = toDateSafe(b.releaseDate);
          const at = ad ? ad.getTime() : 0;
          const bt = bd ? bd.getTime() : 0;
          return bt - at;
        });

        sorted.forEach((release) => {
          const status = classifyReleaseStatus(release);
          const rowClass = status === "eol" ? "old" : status === "soon" ? "soon" : "";
          const latest = release.latest || {};
          const safeLatestUrl = sanitizeExternalUrl(latest.link || "");

          const tr = document.createElement("tr");
          if (rowClass) tr.className = rowClass;

          const cells = [
            release.label || release.name || "-",
            release.isLts ? "Yes" : "No",
            formatDate(release.releaseDate),
            formatDate(release.eoasFrom),
            formatDate(release.eolFrom),
          ];

          cells.forEach((value) => {
            const td = document.createElement("td");
            td.textContent = value;
            tr.appendChild(td);
          });

          const statusTd = document.createElement("td");
          statusTd.appendChild(createStatusElement({ status }));
          tr.appendChild(statusTd);

          const latestTd = document.createElement("td");
          if (safeLatestUrl) {
            const latestAnchor = document.createElement("a");
            latestAnchor.href = safeLatestUrl;
            latestAnchor.target = "_blank";
            latestAnchor.rel = "noopener noreferrer";
            latestAnchor.textContent = latest.name || "View";
            latestTd.appendChild(latestAnchor);
          } else {
            latestTd.textContent = latest.name || "-";
          }
          tr.appendChild(latestTd);

          tbody.appendChild(tr);
        });
      }

      async function renderTimelineView() {
        hideTimelineTooltip();
        const pinnedNames = Array.from(state.pinnedProducts);
        if (pinnedNames.length === 0) {
          root.textContent = "";
          root.appendChild(makeInfoNode("empty", "Pin products on the Dashboard to see the timeline."));
          return;
        }

        // Apply the same filters as the dashboard
        const filteredNames = new Set(getFilteredProducts().map((p) => p.name));
        const visibleNames = pinnedNames.filter((n) => filteredNames.has(n));

        if (visibleNames.length === 0) {
          root.textContent = "";
          root.appendChild(makeInfoNode("empty", "No pinned products match the current filters."));
          return;
        }

        root.textContent = "";
        root.appendChild(makeInfoNode("loading", "Building timeline..."));

        try {
          const details = await Promise.all(visibleNames.map((name) => fetchProduct(name).catch(() => null)));
          const valid = details.filter(Boolean);

          if (valid.length === 0) {
            root.textContent = "";
            root.appendChild(makeInfoNode("error", "No pinned products could be loaded right now. Please retry shortly."));
            return;
          }

          const rows = [];
          valid.forEach((detail) => {
            const supportLabels = {
              eoas: detail.labels?.eoas || "Active support ends",
              eol: detail.labels?.eol || "End of life",
              eoes: detail.labels?.eoes || "Extended support ends",
            };

            (detail.releases || []).forEach((release) => {
              const start = toDateSafe(release.releaseDate);
              const eolDateEnd = toDateSafe(release.eolFrom) || addMonths(new Date(), 18);
              const eoesDateEnd = toDateSafe(release.eoesFrom);
              const end = eoesDateEnd && eoesDateEnd > eolDateEnd ? eoesDateEnd : eolDateEnd;
              const status = classifyReleaseStatus(release);
              if (!start) return;
              if (status === "eol") return;
              rows.push({
                productName: detail.name,
                productLabel: detail.label,
                releaseLabel: release.label || release.name || "(unknown)",
                start,
                end,
                status,
                releaseDate: release.releaseDate || "",
                eoasFrom: release.eoasFrom || "",
                eolFrom: release.eolFrom || "",
                eoesFrom: release.eoesFrom || "",
                latestName: release.latest?.name || "",
                latestDate: release.latest?.date || "",
                supportLabels,
              });
            });
          });

          if (rows.length === 0) {
            root.textContent = "";
            root.appendChild(makeInfoNode("empty", "No release timeline data available for pinned products."));
            return;
          }

          const minDate = new Date(Math.min(...rows.map((r) => r.start.getTime())));
          const maxDate = new Date(Math.max(...rows.map((r) => r.end.getTime())));
          minDate.setMonth(minDate.getMonth() - 1);
          maxDate.setMonth(maxDate.getMonth() + 1);

          const totalRange = maxDate.getTime() - minDate.getTime() || 1;
          const todayPct = ((Date.now() - minDate.getTime()) / totalRange) * 100;

          const byProduct = new Map();
          rows.forEach((row) => {
            const key = `${row.productName}|${row.productLabel}`;
            if (!byProduct.has(key)) byProduct.set(key, []);
            byProduct.get(key).push(row);
          });

          root.textContent = "";
          const timelineWrap = makeEl("div", { className: "timeline" });
          const timelineGrid = makeEl("div", { className: "timeline-grid" });
          const axis = makeEl("div", { className: "timeline-axis" });
          const axisLabel = makeEl("div", { className: "row-label" });
          axisLabel.appendChild(makeEl("strong", {}, "Product / Release"));
          const ticksContainer = makeEl("div", { className: "ticks" });
          axis.appendChild(axisLabel);
          axis.appendChild(ticksContainer);
          const body = makeEl("div", { style: "position:relative" });
          timelineGrid.appendChild(axis);
          timelineGrid.appendChild(body);
          timelineWrap.appendChild(timelineGrid);
          root.appendChild(timelineWrap);

          renderTicks(ticksContainer, minDate, maxDate, totalRange);

          Array.from(byProduct.entries()).forEach(([, productRows]) => {
            productRows.sort((a, b) => b.start - a.start);
            productRows.forEach((row, index) => {
              const left = ((row.start.getTime() - minDate.getTime()) / totalRange) * 100;
              const width = Math.max(2, ((row.end.getTime() - row.start.getTime()) / totalRange) * 100);
              const label = `${row.productLabel} ${row.releaseLabel}`;

              const timelineRow = makeEl("div", { className: "timeline-row" });
              const rowLabel = makeEl("div", { className: "row-label" });
              if (index === 0) rowLabel.appendChild(makeEl("strong", {}, row.productLabel));
              rowLabel.appendChild(makeEl("div", {}, row.releaseLabel));

              const barArea = makeEl("div", { className: "bar-area" });
              const bar = makeEl("div", { className: `bar ${row.status}`, tabindex: "0" });
              bar.style.left = `${left}%`;
              bar.style.width = `${width}%`;
              bar.dataset.open = row.productName;
              bar.dataset.tooltip = "timeline";
              bar.dataset.productLabel = row.productLabel;
              bar.dataset.releaseLabel = row.releaseLabel;
              bar.dataset.status = row.status;
              bar.dataset.releaseDate = row.releaseDate;
              bar.dataset.eoasDate = row.eoasFrom;
              bar.dataset.eolDate = row.eolFrom;
              bar.dataset.eoesDate = row.eoesFrom;
              bar.dataset.eoasLabel = row.supportLabels.eoas;
              bar.dataset.eolLabel = row.supportLabels.eol;
              bar.dataset.eoesLabel = row.supportLabels.eoes;
              bar.dataset.latestName = row.latestName;
              bar.dataset.latestDate = row.latestDate;
              bar.setAttribute("aria-label", `${label}: ${formatDate(row.start)} - ${formatDate(row.end)}`);
              bar.textContent = row.releaseLabel;
              const gradient = buildBarGradient(row);
              if (gradient) bar.style.background = gradient;

              barArea.appendChild(bar);
              timelineRow.appendChild(rowLabel);
              timelineRow.appendChild(barArea);
              body.appendChild(timelineRow);
            });
          });

          const todayLine = document.createElement("div");
          todayLine.className = "today-line";
          const clampedPct = Math.max(0, Math.min(100, todayPct));
          todayLine.style.left = `calc(220px + ${clampedPct} / 100 * (100% - 220px))`;
          body.appendChild(todayLine);

          body.querySelectorAll("[data-open]").forEach((bar) => {
            bar.addEventListener("click", () => {
              location.hash = `#product/${encodeURIComponent(bar.dataset.open)}`;
            });
          });

          attachTimelineTooltipEvents(body);
        } catch (error) {
          root.textContent = "";
          root.appendChild(makeInfoNode("error", explainApiError(error)));
        }
      }

      function attachTimelineTooltipEvents(container) {
        const bars = container.querySelectorAll('.bar[data-tooltip="timeline"]');
        bars.forEach((bar) => {
          bar.addEventListener("mouseenter", () => showTimelineTooltip(bar));
          bar.addEventListener("focus", () => showTimelineTooltip(bar));
          bar.addEventListener("mouseleave", hideTimelineTooltip);
          bar.addEventListener("blur", hideTimelineTooltip);
        });
      }

      function showTimelineTooltip(bar) {
        const releaseDate = formatDate(bar.dataset.releaseDate);
        const eoasDate = formatDate(bar.dataset.eoasDate);
        const eolDate = formatDate(bar.dataset.eolDate);
        const eoesDate = formatDate(bar.dataset.eoesDate);
        const latest = bar.dataset.latestName
          ? `${bar.dataset.latestName}${bar.dataset.latestDate ? ` (${formatDate(bar.dataset.latestDate)})` : ""}`
          : "-";

        timelineTooltip.textContent = "";

        const title = document.createElement("p");
        title.className = "tt-title";
        title.textContent = bar.dataset.productLabel || "Product";

        const subtitle = document.createElement("p");
        subtitle.className = "tt-subtitle";
        subtitle.textContent = bar.dataset.releaseLabel || "Release";

        const statusWrap = document.createElement("div");
        statusWrap.style.marginBottom = "0.45rem";
        statusWrap.appendChild(createStatusElement({ status: bar.dataset.status }));

        const dl = document.createElement("dl");
        dl.className = "tt-grid";

        const addDetail = (term, value) => {
          const dt = document.createElement("dt");
          dt.textContent = term;
          const dd = document.createElement("dd");
          dd.textContent = value;
          dl.appendChild(dt);
          dl.appendChild(dd);
        };

        addDetail("Release date", releaseDate);
        addDetail(bar.dataset.eoasLabel || "Active support ends", eoasDate);
        addDetail(bar.dataset.eolLabel || "End of life", eolDate);
        addDetail(bar.dataset.eoesLabel || "Extended support ends", eoesDate);
        addDetail("Latest", latest);

        timelineTooltip.appendChild(title);
        timelineTooltip.appendChild(subtitle);
        timelineTooltip.appendChild(statusWrap);
        timelineTooltip.appendChild(dl);

        const rect = bar.getBoundingClientRect();
        const gap = 10;
        const maxWidth = 340;
        const viewportWidth = window.innerWidth;
        const viewportHeight = window.innerHeight;

        let left = rect.left + rect.width / 2 - maxWidth / 2;
        left = Math.max(10, Math.min(viewportWidth - maxWidth - 10, left));

        let top = rect.top - 12;
        if (top < 16) {
          top = rect.bottom + gap;
        }
        if (top + 220 > viewportHeight) {
          top = Math.max(10, viewportHeight - 230);
        }

        timelineTooltip.style.left = `${left}px`;
        timelineTooltip.style.top = `${top}px`;
        timelineTooltip.classList.add("visible");
      }

      function hideTimelineTooltip() {
        timelineTooltip.classList.remove("visible");
      }

      function renderTicks(container, minDate, maxDate, totalRange) {
        const ticks = [];
        const startMonth = new Date(minDate.getFullYear(), minDate.getMonth(), 1);
        const endMonth = new Date(maxDate.getFullYear(), maxDate.getMonth(), 1);
        const monthCount =
          (endMonth.getFullYear() - startMonth.getFullYear()) * 12 + (endMonth.getMonth() - startMonth.getMonth()) + 1;
        const width = Math.max(container.clientWidth || 900, 320);
        const maxLabels = Math.max(3, Math.floor(width / 95));
        const stepMonths = Math.max(1, Math.ceil(monthCount / maxLabels));

        const cursor = new Date(startMonth);
        while (cursor <= endMonth) {
          const pct = ((cursor.getTime() - minDate.getTime()) / totalRange) * 100;
          if (pct >= 0 && pct <= 100) {
            const label =
              stepMonths >= 6
                ? cursor.toLocaleDateString(undefined, { year: "numeric" })
                : cursor.toLocaleDateString(undefined, { year: "2-digit", month: "short" });
            ticks.push({ pct, label });
          }
          cursor.setMonth(cursor.getMonth() + stepMonths);
        }

        container.textContent = "";
        ticks.forEach((t) => {
          const tick = makeEl("span", { className: "tick" }, t.label);
          tick.style.left = `${t.pct}%`;
          container.appendChild(tick);
        });
      }

      function escapeHtml(value) {
        return String(value || "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      function cssEscape(value) {
        if (window.CSS && CSS.escape) {
          return CSS.escape(value);
        }
        return String(value).replace(/[^a-zA-Z0-9_-]/g, "\\$&");
      }
    </script>
  </body>
